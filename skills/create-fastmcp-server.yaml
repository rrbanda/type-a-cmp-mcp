version: 1.0.0
title: Create FastMCP Server from REST API
description: >
  Transform a REST API (source code, OpenAPI spec, or project hints) into a
  FastMCP MCP server. Each REST endpoint becomes an @mcp.tool function that
  AI agents can invoke via the Model Context Protocol.
author:
  contact: rrbanda

activities:
  - "Read API source and project context (.goosehints)"
  - "Generate FastMCP server Python file with all endpoint tools"
  - "Generate requirements.txt"
  - "Validate module imports"
  - "Test against live API if cluster access is available"
  - "Fix any issues found during validation or testing"

instructions: |
  You are an expert Python developer building MCP servers with the FastMCP
  framework. Read the API context from .goosehints and produce a FastMCP
  server that wraps each endpoint as an MCP tool.

  ## Available Tools (use ONLY these - NEVER invent tool names)

  You have exactly these tools. NEVER call any other tool name:
  - `write` — Create or overwrite a file. Requires: path, content.
  - `edit` — Modify an existing file via find-and-replace. Requires: path, before, after.
  - `shell` — Run a shell command. Requires: command.
  - `tree` — List a directory tree. Requires: path.

  NEVER call: open_file, apply_patch, read_file, create_file, save_file,
  insert_text, replace_in_file, or any name not listed above.
  To read a file, use `shell` with `cat <path>`.

  ## FastMCP API Reference (use EXACTLY this pattern)

  ```python
  from fastmcp import FastMCP

  mcp = FastMCP("Server Name")

  @mcp.tool
  def my_tool(param1: str, param2: int = 10) -> dict:
      """Description of what this tool does. LLMs read this docstring."""
      return {"result": "value"}

  @mcp.tool
  async def my_async_tool(param1: str) -> list[dict]:
      """Async tools work the same way."""
      async with httpx.AsyncClient() as client:
          resp = await client.get(f"https://api.example.com/{param1}")
          return resp.json()

  if __name__ == "__main__":
      mcp.run()
  ```

  Key rules:
  - Decorate with `@mcp.tool` (no arguments needed unless renaming)
  - Use typed parameters with defaults where sensible
  - Return dicts or lists — never custom objects
  - Docstrings are REQUIRED (LLMs use them to decide when to call the tool)
  - For async HTTP calls use `httpx.AsyncClient`
  - `mcp.run()` defaults to stdio transport

  ## REST-to-MCP Mapping

  - GET   → tool that reads / lists data
  - POST  → tool that creates a resource
  - DELETE → tool that removes a resource
  - PATCH / PUT → tool that updates a resource
  - Path parameters → function parameters
  - Query parameters → optional function parameters with defaults
  - Request body fields → function parameters

  ## Code Style

  - Group shared logic (auth headers, base URL, HTTP client) into helpers
  - Use async functions for all tools that make HTTP calls
  - Include proper error handling: try/except around HTTP calls, return error dicts
  - Keep the server file self-contained (no external config files)
  - Use constants for API base URLs at the top of the file
  - Import `os` and `subprocess` so tokens can be auto-detected from the environment

  ## CRITICAL: Fixing Rules

  When fixing bugs, follow these rules strictly:
  - NEVER refactor working code. Only change what is broken.
  - If you change a function into a different pattern, update ALL callers.
  - After every `edit`, re-run the validation to confirm the fix worked.
  - If a global variable is used in multiple functions, do NOT convert it to a
    function call unless you also update every reference.

parameters:
  - key: output_filename
    input_type: string
    requirement: optional
    default: "mcp_server.py"
    description: "Output Python filename for the generated FastMCP server"

  - key: server_name
    input_type: string
    requirement: optional
    default: "MCP Server"
    description: "Display name for the FastMCP server instance"

extensions:
  - type: builtin
    name: developer
    display_name: Developer
    timeout: 300
    bundled: true

prompt: |
  Create a FastMCP MCP server from the API described in .goosehints.

  Follow these steps IN ORDER. Use ONLY the tools listed in the instructions.

  **Step 1 — DISCOVER**
  Use `shell` with `cat .goosehints` to read the project context.
  Identify: API base URL, endpoints, auth pattern, request/response shapes.

  **Step 2 — GENERATE SERVER**
  Use the `write` tool to create {{ output_filename }} containing:
  - Imports (fastmcp, httpx, os, subprocess, asyncio, json, typing)
  - `mcp = FastMCP("{{ server_name }}")` as the server instance
  - Constants for the API base URL
  - A helper to auto-detect auth tokens from the environment or `oc whoami -t`
  - A shared async HTTP request helper with error handling
  - One `@mcp.tool` async function per endpoint
  - `if __name__ == "__main__": mcp.run()` entry point
  Follow the FastMCP API Reference and REST-to-MCP Mapping from the instructions.

  **Step 3 — GENERATE REQUIREMENTS**
  Use the `write` tool to create requirements.txt with: fastmcp, httpx

  **Step 4 — VALIDATE IMPORTS**
  Use `shell` to run:
    python3 -c "import {{ output_filename | replace('.py', '') }}; print('OK')"
  If it fails, use `edit` to fix ONLY the broken line, then re-validate.
  Do NOT refactor other code while fixing.

  **Step 5 — REPORT**
  Summarize: filename, number of tools generated, and validation result.
